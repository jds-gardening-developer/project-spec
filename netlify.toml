# Netlify config — Docsify is fully client-side so there's nothing to build.
# Netlify just serves the repo root as static files.

[build]
  publish = "."
  command = ""

# Cache the spec markdown briefly so updates show up quickly on deploy
[[headers]]
  for = "/README.md"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Cache static HTML & long-lived assets aggressively
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Pretty URLs: visiting /erp resolves to /README.md content via Docsify routing,
# so no rewrites are needed. Docsify handles client-side routing.
