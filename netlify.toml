# Netlify config — Vite + React build for the MacPlants ERP spec viewer.

[build]
  publish = "app/dist"
  command = "npm run build"

# Cache the built HTML briefly so spec snapshots show up quickly on deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# SPA fallback — Vite produces a single-page app, so unknown routes serve index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
