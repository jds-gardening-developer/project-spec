<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MacPlants ERP — Specification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Living specification for the MacPlants ERP build.">
  <meta name="theme-color" content="#2c8d4f">

  <!-- Docsify theme: vue (clean, light) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #2c8d4f;          /* MacPlants green */
      --theme-color-secondary: #1f6638;
    }
    /* Reduce sidebar padding for compact navigation */
    .sidebar ul { padding: 0; }
    .sidebar li { margin: 0; padding: 0; }
    .sidebar a { padding: 4px 8px; font-size: 14px; }
    .sidebar ul ul { margin: 0 !important; }
    .sidebar ul ul li { margin: 0 !important; }
    /* Tighter table cells so the schema tables don't sprawl */
    .markdown-section table { font-size: 14px; }
    .markdown-section table th,
    .markdown-section table td { padding: 6px 10px; }
    /* First column of tables = field name, slightly emphasised */
    .markdown-section table td:first-child { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    /* Second column = type, monospace too */
    .markdown-section table td:nth-child(2) { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; color: #555; }
    /* Make the floating TOC stickier */
    .docsify-pagination-container { margin-top: 3rem; }
    /* Fade in the rendered content so it's less jarring on navigation */
    .markdown-section { animation: fade 200ms ease-in; }
    @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="app">Loading the spec…</div>

  <script>
    window.$docsify = {
      name: 'MacPlants ERP',
      repo: '',                              // fill in once the GitHub repo is live
      loadSidebar: false,                    // single-file mode — no _sidebar.md needed
      subMaxLevel: 1,                        // only show h2 (PRD) level; click to expand
      auto2top: true,                        // scroll to top on navigation
      maxLevel: 2,                           // only h2 headings in sidebar (PRD level)
      mergeNavbar: true,                     // tidier on mobile
      homepage: 'project-spec/2026-05-02.md',
      notFoundPage: true,
      executeScript: false,                  // never run inline JS from the markdown — safer
      search: {
        maxAge: 86400000,                    // 1 day cache
        paths: 'auto',
        placeholder: 'Search the spec (Ctrl+K)…',
        noData: 'No matches.',
        depth: 4,
        hideOtherSidebarContent: false
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      }
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>

  <!-- Optional syntax highlighting (handy if any code blocks creep back in) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
